<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEURAL NET // Digital Twin</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #0a0a0a;
            --neon-blue: #00f3ff;
            --neon-red: #ff0055;
            --neon-green: #00ff41;
            --text: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
        }
        #dashboard {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid #333;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            position: relative;
        }
        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
        }
        h2 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-blue); }
        
        /* Top Bar */
        #header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-blue); }
        .status { font-size: 12px; color: var(--neon-green); animation: blink 2s infinite; }
        
        /* Main Graph */
        #graph-container { grid-column: 2; grid-row: 2; position: relative; }
        .node circle { stroke: #fff; stroke-width: 2px; transition: all 0.3s; }
        .node text { font-size: 10px; fill: #fff; pointer-events: none; }
        .link { stroke: #555; stroke-opacity: 0.6; }
        .link.active { stroke: var(--neon-blue); stroke-width: 2px; }
        
        /* Risk Nodes */
        .node.risk circle { stroke: var(--neon-red); fill: var(--neon-red); }
        .node.risk text { fill: var(--neon-red); }

        /* Lists */
        ul { list-style: none; padding: 0; }
        li { padding: 5px 0; border-bottom: 1px solid #222; font-size: 12px; }
        .risk-high { color: var(--neon-red); }
        .risk-low { color: var(--neon-green); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="header" class="panel">
        <div style="font-weight:bold; font-size: 20px;">NEURAL<span style="color:var(--neon-blue)">NET</span> // TWIN</div>
        <div class="status">● SYSTEM ONLINE // AI ACTIVE</div>
    </div>

    <!-- Left Panel: Host Inventory -->
    <div class="panel">
        <h2>Host Inventory</h2>
        <div id="host-list"></div>
    </div>

    <!-- Center: The Digital Twin -->
    <div id="graph-container" class="panel">
        <h2>Topology Map</h2>
        <div id="network-graph"></div>
    </div>

    <!-- Right Panel: AI Insights -->
    <div class="panel">
        <h2>AI Risk Assessment</h2>
        <div id="risk-list"></div>
    </div>

    <!-- Bottom: Traffic Flow -->
    <div class="panel" style="grid-column: 1 / -1;">
        <h2>Real-time Traffic Volume</h2>
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<script>
    // --- MOCK DATA (Simulating Python Backend Output) ---
    const data = {
        "nodes": [
            {"id": "192.168.1.10", "ports": [22, 80, 443], "services": ["SSH", "HTTP"], "risk": 5, "profile": "Normal", "bytes": 5000},
            {"id": "192.168.1.15", "ports": [22, 23, 80, 443, 3306, 5432, 8080, 9000, 1234, 5678, 9999], "services": ["SSH", "Telnet"], "risk": 85, "profile": "Reconnaissance", "bytes": 12000},
            {"id": "10.0.0.5", "ports": [443], "services": ["HTTPS"], "risk": 10, "profile": "Normal", "bytes": 50000000},
            {"id": "172.16.0.1", "ports": [53], "services": ["DNS"], "risk": 0, "profile": "Infrastructure", "bytes": 1000}
        ],
        "links": [
            {"source": "192.168.1.10", "target": "10.0.0.5", "type": "TCP", "weight": 150},
            {"source": "192.168.1.15", "target": "192.168.1.10", "type": "TCP", "weight": 500},
            {"source": "172.16.0.1", "target": "192.168.1.10", "type": "UDP", "weight": 200}
        ]
    };

    // --- D3.JS VISUALIZATION ---
    const width = document.getElementById('graph-container').clientWidth;
    const height = document.getElementById('graph-container').clientHeight;

    const svg = d3.select("#network-graph").append("svg")
        .attr("width", width)
        .attr("height", height)
        .call(d3.zoom().on("zoom", (event) => {
            g.attr("transform", event.transform);
        }));

    const g = svg.append("g");

    const simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));

    const link = g.append("g").attr("class", "links").selectAll("line")
        .data(data.links)
        .enter().append("line")
        .attr("class", "link");

    const node = g.append("g").attr("class", "nodes").selectAll(".node")
        .data(data.nodes)
        .enter().append("g")
        .attr("class", d => `node ${d.risk > 50 ? 'risk' : ''}`)
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end
